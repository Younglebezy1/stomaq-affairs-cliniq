<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password – Stomaq Affairs Cliniq</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">Stomaq Affairs Cliniq</div>
    <h1 class="auth-title">Forgot Password?</h1>
    <p class="auth-sub">Enter your email and we'll send you a reset link</p>

    <div class="alert-box" id="alertBox"></div>

    <form onsubmit="handleForgot(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <button type="submit" class="btn-full" id="submitBtn">Send Reset Link</button>
    </form>

    <div class="auth-footer">
      Remembered it? <a href="login.html">Back to Login</a>
    </div>

  </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
