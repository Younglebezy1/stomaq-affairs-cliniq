<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Stomaq Affairs Cliniq</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">Stomaq Affairs Cliniq</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Login to your account to continue</p>

    <div class="alert-box" id="alertBox"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required/>
      </div>
      <div class="forgot-link">
        <a href="forgot-password.html">Forgot password?</a>
      </div>
      <button type="submit" class="btn-full" id="submitBtn">Login</button>
    </form>

    <div class="divider-text">or</div>

    <button class="btn-google" onclick="handleGoogleLogin()">
      <!-- Google icon -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.4 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.9 6.1C12.5 13.2 17.8 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.8-2.2 5.2-4.6 6.8l7.2 5.6C43.4 36.8 46.5 31.1 46.5 24.5z"/>
        <path fill="#FBBC05" d="M10.6 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.9-6.1z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.2-5.6c-2 1.4-4.6 2.1-8 2.1-6.2 0-11.5-3.7-13.4-9.4l-7.9 6.1C6.6 42.6 14.6 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Sign up</a>
    </div>

  </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
